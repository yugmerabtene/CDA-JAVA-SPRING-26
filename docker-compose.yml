services:
  mysql:
    image: mysql:8.0.37
    container_name: cda-mysql
    environment:
      MYSQL_DATABASE: cda_java
      MYSQL_USER: cda
      MYSQL_PASSWORD: cda
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: cda-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: cda-app
    environment:
      DB_URL: jdbc:mysql://mysql:3306/cda_java
      DB_USERNAME: cda
      DB_PASSWORD: cda
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
